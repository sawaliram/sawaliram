services:
  postgres:
    image: postgres:14-alpine
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=sawaliram
    volumes:
      - db:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    restart: always

  memcached:
    image: memcached:alpine
    restart: always

  web:
    build: .
    container_name: django-sawaliram-app
    command: sh -c "python manage.py migrate && python manage.py compress --force && python manage.py collectstatic --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:8000 --timeout 120 --access-logfile - --error-logfile - --log-level info"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - sawaliram_secret_key=${DJANGO_SECRET_KEY}
      - environment=${DJANGO_ENV:-production}
      - sawaliram_debug_value=False
      - sawaliram_db_password=${DB_PASSWORD}
      - DB_HOST=postgres
      - CELERY_BROKER_URL=amqp://rabbitmq
      - MEMCACHED_LOCATION=memcached:11211
      - GOOGLE_SECRET_KEY=${GOOGLE_SECRET_KEY:-}
      - GOOGLE_SITE_KEY=${GOOGLE_SITE_KEY:-}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-True}
    depends_on:
      - postgres
      - rabbitmq
      - memcached

volumes:
  db:
